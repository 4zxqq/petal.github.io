<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Petal</title>

    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        .logo {
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 5px white); }
            to { filter: drop-shadow(0 0 20px white); }
        }

        h1 {
            font-size: 60px;
        }

        p {
            font-size: 20px;
            color: #94a3b8;
        }
    </style>

</head>
<body>

<svg class="logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <circle cx="32" cy="32" r="10" fill="white"/>
  <path fill="white" d="M32 0 L36 24 L60 32 L36 40 L32 64 L28 40 L4 32 L28 24 Z"/>
</svg>

<h1>Petal</h1>
<p>Welcome to Petal</p>

<a href="login.html">
    <button style="
        padding: 15px 30px;
        font-size: 18px;
        margin-top: 20px;
        border-radius: 8px;
        border: none;
        background-color: #22c55e;
        color: white;
        cursor: pointer;
    ">Login</button>
</a>

</body>
</html>
