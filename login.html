<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Petal</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background-color: #22c55e;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #16a34a;
        }
    </style>
</head>
<body>

<h1>Login</h1>

<input type="text" placeholder="Email" id="email"><br>
<input type="password" placeholder="Password" id="password"><br>
<button onclick="login()">Login</button>

<script>
function login() {
    window.location.href = "search.html";
}
</script>

</body>
</html>
